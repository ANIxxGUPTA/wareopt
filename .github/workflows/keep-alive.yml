name: Keep Render Backend Alive

on:
  schedule:
    - cron: '*/14 * * * *' # Runs every 14 minutes to prevent Render free tier from sleeping
  workflow_dispatch: # Allow manual triggering

jobs:
  ping-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API
        run: |
          curl -sSf https://wareopt-backend.onrender.com/api/inventory > /dev/null || echo "Ping failed but workflow will continue"
