databases:
  - name: wareopt-db
    plan: free

services:
  # Spring Boot Backend
  - type: web
    name: wareopt-backend
    env: docker
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    plan: free
    healthCheckPath: /api/shifts
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: wareopt-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: wareopt-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: wareopt-db
          property: database
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: wareopt-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: wareopt-db
          property: password
      - key: SPRING_SQL_INIT_MODE
        value: always

  # React Frontend
  - type: web
    name: wareopt-frontend
    env: docker
    dockerContext: ./frontend
    dockerfilePath: ./frontend/Dockerfile
    plan: free
    envVars:
      - key: VITE_API_URL
        value: https://wareopt-backend.onrender.com/api
